<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuscaOferta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #09090b;
      color: white;
    }

    a {
      text-decoration: none;
    }

    .container {
      width: 90%;
      max-width: 1300px;
      margin: auto;
    }

    header {
      background: #111111;
      border-bottom: 1px solid #27272a;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
      flex-wrap: wrap;
    }

    .logo h1 {
      color: #facc15;
      font-size: 2rem;
      font-weight: 900;
    }

    .logo p {
      color: #a1a1aa;
      font-size: 0.9rem;
    }

    .search-box {
      flex: 1;
      max-width: 700px;
      display: flex;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 18px;
      overflow: hidden;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      padding: 18px;
      font-size: 1rem;
    }

    .search-box button {
      background: #facc15;
      color: black;
      border: none;
      padding: 18px 30px;
      font-weight: 700;
      cursor: pointer;
    }

    .products {
      padding: 80px 0;
    }

    /* 🔥 GRID AJUSTADO */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    /* 🔥 CARD FLEX PARA ALINHAR TUDO */
    .product-card {
      background: #111111;
      border: 1px solid #27272a;
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-8px);
      border-color: #facc15;
    }

    /* 🔥 IMAGEM MENOR E PROPORCIONAL */
    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: white;
    }

    /* 🔥 CONTEÚDO FLEX */
    .product-info {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-info h3 {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .price {
      color: #facc15;
      font-size: 1.5rem;
      font-weight: 900;
      margin-bottom: 15px;
    }

    /* 🔥 BOTÃO ALINHADO SEMPRE EM BAIXO */
    .offer-btn {
      margin-top: auto;
      display: block;
      text-align: center;
      background: #facc15;
      color: black;
      padding: 14px;
      border-radius: 18px;
      font-weight: 700;
      transition: 0.3s;
    }

    .offer-btn:hover {
      background: #fde047;
      transform: scale(1.02);
    }

  </style>
</head>

<body>

<header>
  <div class="container header-content">
    <div class="logo">
      <h1>BuscaOferta</h1>
      <p>Pesquise produtos com facilidade</p>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Pesquise celulares, notebooks, games...">
      <button>Buscar</button>
    </div>
  </div>
</header>



<section class="products">
  <div class="container">

    <h2 class="section-title">Produtos</h2>

    <div class="product-grid" id="productGrid"></div>

  </div>
</section>

<script>
  const produtos = [
    {
      nome: 'Computador Gamer Intel Core i7 16GB SSD 512GB',
      preco: 'R$ 1.868',
      imagem: 'https://http2.mlstatic.com/D_NQ_NP_2X_988423-MLA100007094971_122025-F.webp',
      link: 'https://meli.la/2NhixEq'
    },

    {
      nome: 'Notebook Asus Vivobook 15 Intel Core i5',
      preco: 'R$ 3.078',
      imagem: 'https://http2.mlstatic.com/D_NQ_NP_2X_874192-MLA99597035710_122025-F.webp',
      link: 'https://meli.la/1PEsqeY'
    },

    {
      nome: 'Computador Completo Intel Core i5 16GB SSD',
      preco: 'R$ 1.635',
      imagem: 'https://http2.mlstatic.com/D_NQ_NP_2X_947438-MLA109935568933_042026-F.webp',
      link: 'https://meli.la/2i32B5x'
    },

    {
      nome: 'Placa-mãe Asus AMD AM4 B550M',
      preco: 'R$ 797',
      imagem: 'https://http2.mlstatic.com/D_NQ_NP_2X_666926-MLA99989580013_112025-F.webp',
      link: 'https://meli.la/1fAiqeS'
    },

    {
      nome: 'Monitor LG UltraGear 24 144Hz',
      preco: 'R$ 679',
      imagem: 'https://http2.mlstatic.com/D_NQ_NP_2X_685909-MLA101438581463_122025-F.webp',
      link: 'https://meli.la/1JtZZra'
    },

        {
      nome: 'Monitor LG UltraGear 24 144Hz',
      preco: 'R$ 3.699',
      imagem: 'https://http2.mlstatic.com/D_NQ_NP_2X_678582-MLA99572282914_122025-F.webp',
      link: 'https://meli.la/1ErojXP'
    }

    
    
    
    
  ];

  const productGrid = document.getElementById("productGrid");

  function renderizarProdutos(lista) {
    productGrid.innerHTML = "";

    lista.forEach(p => {
      productGrid.innerHTML += `
        <div class="product-card">
          <img src="${p.imagem}">
          <div class="product-info">
            <h3>${p.nome}</h3>
            <span class="price">${p.preco}</span>
            <a href="${p.link}" target="_blank" class="offer-btn">Ver Produto</a>
          </div>
        </div>
      `;
    });
  }

  renderizarProdutos(produtos);
</script>

</body>
</html>
